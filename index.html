<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulkit Yadav</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

nav h1{
  color:#00ffe0;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h2{
  font-size:50px;
  background:linear-gradient(90deg,#ff00cc,#00ffe0,#ffcc00);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  background:linear-gradient(90deg,#ff00cc,#00ffe0);
  color:black;
  font-weight:bold;
  text-decoration:none;
}

/* CARD */
.card{
  margin:30px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px #00ffe0;
}
</style>
</head>

<body>

<nav>
  <h1>Pulkit Yadav</h1>
</nav>

<div class="hero">
  <h2>DevOps • Cloud • Cybersecurity</h2>
  <p>Building elite DevOps systems with AWS & Kubernetes</p>
  <a href="#" class="btn">Explore</a>
</div>

<div class="card">
  <h3>🔥 DevSecOps Pipeline</h3>
  <p>CI/CD + Docker + Kubernetes + Security</p>
</div>

<div class="card">
  <h3>☁️ AWS Infrastructure</h3>
  <p>Scalable cloud architecture</p>
</div>

</body>
</html>
