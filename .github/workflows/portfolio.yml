name: portfolio

on:
    push:
       # branches: [main]
    workflow_dispatch:
      
      
permissions:
    pages: write
    id-token: write
    contents: read

jobs:
    
    deploy:
        runs-on: ubuntu-latest

        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: code checkout
              uses: actions/checkout@v4

            - name: configured page
              uses: actions/configure-pages@v4

            - name: upload static page
              uses: actions/upload-pages-artifact@v4
              with:
                path: "."

            - name: deploy the page
              uses: actions/deploy-pages@v4
