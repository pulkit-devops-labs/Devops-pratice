name: python lint

on:
    push:
        branches: [main]

jobs:

    showing:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python 
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: pip install -r requirements.txt
              with

            - name: run linter
              run: flake8 app.py
